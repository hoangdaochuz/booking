services:
  # ─── Databases ───
  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticketbox_user
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketbox_secret}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketbox -d ticketbox_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketbox-net

  postgres-event:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticketbox_event
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketbox_secret}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-event:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketbox -d ticketbox_event"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketbox-net

  postgres-booking:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticketbox_booking
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketbox_secret}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-booking:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketbox -d ticketbox_booking"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketbox-net

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticketbox_notification
      POSTGRES_USER: ticketbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketbox_secret}
    ports:
      - "5436:5432"
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketbox -d ticketbox_notification"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketbox-net

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticketbox-net

  # ─── Kafka ───
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ticketbox-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - ticketbox-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ticketbox
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - ticketbox-net

  # ─── Application Services ───
  user-service:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    environment:
      SERVICE_NAME: user-service
      GRPC_PORT: "50051"
      DATABASE_URL: postgres://ticketbox:${POSTGRES_PASSWORD:-ticketbox_secret}@postgres-user:5432/ticketbox_user?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
    depends_on:
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticketbox-net

  event-service:
    build:
      context: .
      dockerfile: services/event/Dockerfile
    environment:
      SERVICE_NAME: event-service
      GRPC_PORT: "50052"
      DATABASE_URL: postgres://ticketbox:${POSTGRES_PASSWORD:-ticketbox_secret}@postgres-event:5432/ticketbox_event?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres-event:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticketbox-net

  booking-service:
    build:
      context: .
      dockerfile: services/booking/Dockerfile
    environment:
      SERVICE_NAME: booking-service
      GRPC_PORT: "50053"
      DATABASE_URL: postgres://ticketbox:${POSTGRES_PASSWORD:-ticketbox_secret}@postgres-booking:5432/ticketbox_booking?sslmode=disable
      KAFKA_BROKERS: kafka:29092
      EVENT_SERVICE_ADDR: event-service:50052
      BOOKING_MODE: ${BOOKING_MODE:-pessimistic}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres-booking:
        condition: service_healthy
      kafka:
        condition: service_healthy
      event-service:
        condition: service_started
    networks:
      - ticketbox-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    environment:
      SERVICE_NAME: notification-service
      DATABASE_URL: postgres://ticketbox:${POSTGRES_PASSWORD:-ticketbox_secret}@postgres-notification:5432/ticketbox_notification?sslmode=disable
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticketbox-net

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      SERVICE_NAME: gateway
      HTTP_PORT: "8000"
      USER_SERVICE_ADDR: user-service:50051
      EVENT_SERVICE_ADDR: event-service:50052
      BOOKING_SERVICE_ADDR: booking-service:50053
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
    depends_on:
      - user-service
      - event-service
      - booking-service
      - redis
    networks:
      - ticketbox-net

volumes:
  pgdata-user:
  pgdata-event:
  pgdata-booking:
  pgdata-notification:
  redis-data:

networks:
  ticketbox-net:
    driver: bridge
